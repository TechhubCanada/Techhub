[build]
builder = "RAILPACK"
buildCommand = "pnpm exec medusa build"

[deploy]
startCommand = "test -f .medusa/server/public/admin/index.html && cd .medusa/server && pnpm exec medusa start --host ${HOST:-0.0.0.0} --port ${PORT:-9000}"
preDeployCommand = ["pnpm exec medusa db:migrate --execute-safe-links"]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
