[build]
builder = "RAILPACK"
buildCommand = "pnpm exec medusa build"

[deploy]
startCommand = "cd .medusa/server && pnpm exec medusa start --host ${HOST:-0.0.0.0} --port ${PORT:-9000}"
preDeployCommand = ["pnpm exec medusa db:migrate --execute-safe-links"]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
